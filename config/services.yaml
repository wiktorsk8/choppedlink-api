parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    App\:
        resource: '../src/'
    Module\:
        resource: '../modules/'

    # --- Redis (read model) ---
    Predis\Client:
        arguments:
            $parameters: '%env(REDIS_URL)%'
    Predis\ClientInterface: '@Predis\Client'

    # --- CQRS read side: bind query interfaces to their Redis-backed implementations ---
    Module\ShortLink\Application\UseCase\Queries\GetUrl\GetUrlQuery:
        '@Module\ShortLink\Infrastructure\ReadModel\RedisGetUrlQuery'
    Module\ShortLink\Application\UseCase\Queries\GetShortLink\GetShortLinkQuery:
        '@Module\ShortLink\Infrastructure\ReadModel\RedisGetShortLinkQuery'

    # --- Read-model write port -> Redis adapter ---
    Module\ShortLink\Application\ReadModel\ClickCounter:
        '@Module\ShortLink\Infrastructure\ReadModel\RedisClickCounter'

    # --- Write side: bind the domain repositories to their Doctrine implementations ---
    Module\ShortLink\Domain\Repositories\ShortLinkRepository:
        '@Module\ShortLink\Infrastructure\Persistence\Doctrine\Repository\ShortLinkRepository'
    Module\ShortLink\Domain\Repositories\ShortLinkClickRepository:
        '@Module\ShortLink\Infrastructure\Persistence\Doctrine\Repository\ShortLinkClickRepository'

    # --- Projection: ShortLinkCreated -> Redis read model ---
    Module\ShortLink\Infrastructure\ReadModel\ShortLinkProjector:
        tags:
            - { name: kernel.event_listener, event: Module\ShortLink\Domain\Events\ShortLinkCreated, method: onShortLinkCreated }

    _instanceof:
        Module\Shared\Application\Command\CommandHandler:
            tags:
                - { name: 'messenger.message_handler', bus: command.bus }
